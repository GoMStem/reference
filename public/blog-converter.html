<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블로그 → MD 변환기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 480px;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #dc3545;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 32px;
    color: #fff;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  input {
    width: 100%;
    padding: 16px 20px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #1a1a1a;
    border: 2px solid #333;
    border-radius: 12px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: #22c55e;
  }

  input::placeholder {
    color: #666;
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    background: #22c55e;
    color: #000;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  button:hover {
    background: #16a34a;
    transform: translateY(-1px);
  }

  button:active {
    transform: translateY(0);
  }

  button:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }

  .status.success {
    display: block;
    background: #052e16;
    border: 1px solid #22c55e33;
    color: #86efac;
  }

  .status.error {
    display: block;
    background: #2a0a0a;
    border: 1px solid #ef444433;
    color: #fca5a5;
  }

  .status.loading {
    display: block;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #999;
  }

  .history {
    margin-top: 40px;
    border-top: 1px solid #222;
    padding-top: 24px;
  }

  .history h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .history-item {
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 13px;
    color: #888;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-item .url {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 12px;
  }

  .history-item .time {
    color: #555;
    font-size: 12px;
    white-space: nowrap;
  }

  .history-item .retry {
    color: #22c55e;
    cursor: pointer;
    margin-left: 8px;
    font-size: 12px;
  }

  .footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: #444;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">GoMStem</div>
  <h1>네이버 블로그 →<br>마크다운 변환기</h1>

  <div class="input-group">
    <input
      type="url"
      id="blogUrl"
      placeholder="네이버 블로그 URL을 붙여넣으세요"
      autocomplete="off"
    />
  </div>

  <button id="submitBtn" onclick="submitUrl()">변환 시작</button>

  <div id="status" class="status"></div>

  <div class="history" id="historySection" style="display:none;">
    <h3>최근 변환 기록</h3>
    <div id="historyList"></div>
  </div>

  <div class="footer">
    n8n + Cloudflare R2 + GitHub + Vercel
  </div>
</div>

<script>
  // ★★★ 여기에 Production Webhook URL을 넣으세요 ★★★
  const WEBHOOK_URL = 'https://n8n.gomslab.com/webhook/blog-to-md';

  const statusEl = document.getElementById('status');
  const btnEl = document.getElementById('submitBtn');
  const inputEl = document.getElementById('blogUrl');

  // 히스토리 로드
  let history = [];
  try {
    history = JSON.parse(localStorage.getItem('blogHistory') || '[]');
  } catch(e) {}
  renderHistory();

  // Enter 키로 실행
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitUrl();
  });

  async function submitUrl() {
    const url = inputEl.value.trim();

    if (!url) {
      showStatus('URL을 입력해주세요.', 'error');
      return;
    }

    if (!url.includes('blog.naver.com')) {
      showStatus('네이버 블로그 URL이 아닌 것 같아요.', 'error');
      return;
    }

    btnEl.disabled = true;
    btnEl.textContent = '변환 중...';
    showStatus('⏳ 블로그 글을 가져오고 있습니다...', 'loading');

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ blogUrl: url }),
      });

      if (response.ok) {
        showStatus('✅ 변환 완료! GitHub에 푸시되었습니다.\nVercel 배포까지 1~2분 소요될 수 있어요.', 'success');
        addHistory(url);
        inputEl.value = '';
      } else {
        showStatus('❌ 오류가 발생했습니다. (HTTP ' + response.status + ')', 'error');
      }
    } catch (err) {
      showStatus('❌ 연결 실패: ' + err.message, 'error');
    }

    btnEl.disabled = false;
    btnEl.textContent = '변환 시작';
  }

  function showStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }

  function addHistory(url) {
    history.unshift({
      url: url,
      time: new Date().toLocaleString('ko-KR'),
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('blogHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');

    if (history.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    list.innerHTML = history.map(item => `
      <div class="history-item">
        <span class="url">${item.url}</span>
        <span class="time">${item.time}</span>
        <span class="retry" onclick="retryUrl('${item.url}')">재실행</span>
      </div>
    `).join('');
  }

  function retryUrl(url) {
    inputEl.value = url;
    submitUrl();
  }
</script>
</body>
</html>
